services:
  - type: web
    name: judiq-api
    runtime: python
    region: singapore   # closest to India — change to: oregon / frankfurt / ohio
    plan: free          # change to: starter ($7/mo) to avoid spin-down

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn judiq:app --host 0.0.0.0 --port $PORT

    # ── Environment Variables ──────────────────────────────────────────────
    envVars:

      # ── Google Drive KB ───────────────────────────────────────────────────
      - key: GDRIVE_FILE_ID
        value: 1DfejIbgRXco3Tpp_aTBfarIm7h3t32EVykJGkEFdee4

      - key: GDRIVE_API_KEY
        value: ""   # optional — leave empty if not using

      # ── Firebase Auth (Project: idcourt-cb58f) ────────────────────────────
      #
      # HOW TO GET YOUR SERVICE ACCOUNT KEY (one-time setup):
      #   1. Go to https://console.firebase.google.com
      #   2. Select project  →  idcourt-cb58f
      #   3. Project Settings  →  Service Accounts tab
      #   4. Click "Generate new private key"  →  download the JSON file
      #   5. Open the JSON file, copy ALL of its content (the entire JSON)
      #   6. In Render Dashboard  →  Environment  →  add a SECRET env var:
      #        Key:   FIREBASE_SERVICE_ACCOUNT_JSON
      #        Value: <paste the entire JSON string here>
      #
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        value: ""   # ← REQUIRED: paste full service-account JSON string here

      - key: FIREBASE_PROJECT_ID
        value: idcourt-cb58f

      - key: FIREBASE_AUTH_DOMAIN
        value: idcourt-cb58f.firebaseapp.com

      - key: FIREBASE_APP_ID
        value: "1:941086914513:web:8edad96b7e9f0dd4be12f0"

      - key: FIREBASE_MESSAGING_SENDER_ID
        value: "941086914513"

      # ── System ────────────────────────────────────────────────────────────
      - key: LOG_LEVEL
        value: WARNING
